<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeffwordle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121213;
      color: #fff;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px 8px 24px;
    }

    header {
      width: 100%;
      max-width: 720px;
      border-bottom: 1px solid #3a3a3c;
      padding-bottom: 12px;
      margin-bottom: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    header p {
      font-size: 0.75rem;
      color: #818384;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ── grid ── */
    #board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      margin-bottom: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 5px;
    }

    .tile {
      width: 46px;
      height: 46px;
      border: 2px solid #3a3a3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      user-select: none;
      transition: border-color 0.1s;
    }

    .tile[data-letter] { border-color: #565758; }

    .tile.pop {
      animation: pop 0.1s ease-in-out;
    }

    .tile.shake {
      animation: shake 0.4s ease;
    }

    .tile.flip {
      animation: flip 0.5s ease forwards;
    }

    .tile.correct  { --bg: #538d4e; }
    .tile.present  { --bg: #b59f3b; }
    .tile.absent   { --bg: #3a3a3c; }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-4px); }
      40%       { transform: translateX(4px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    @keyframes flip {
      0%   { transform: rotateX(0);    background: transparent; border-color: #565758; color: #fff; }
      49%  { transform: rotateX(90deg); background: transparent; }
      50%  { transform: rotateX(90deg); background: var(--bg); border-color: var(--bg); color: #fff; }
      100% { transform: rotateX(0);    background: var(--bg); border-color: var(--bg); color: #fff; }
    }

    /* ── message ── */
    #message {
      min-height: 36px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 1px;
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #message.visible {
      opacity: 1;
      background: #fff;
      color: #121213;
    }

    /* ── keyboard ── */
    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      width: 100%;
      max-width: 680px;
    }

    .kb-row {
      display: flex;
      gap: 5px;
    }

    .key {
      height: 56px;
      min-width: 38px;
      padding: 0 6px;
      background: #818384;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      user-select: none;
    }

    .key:active { filter: brightness(0.85); }

    .key[data-key="Enter"] { min-width: 58px; font-size: 0.7rem; }
    .key[data-key="⌫"]    { min-width: 58px; font-size: 1rem; }

    .key.correct { background: #538d4e; }
    .key.present { background: #b59f3b; }
    .key.absent  { background: #3a3a3c; }

    /* ── play-again ── */
    #play-again {
      display: none;
      margin-top: 16px;
      padding: 10px 28px;
      background: #538d4e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }
    #play-again:hover { background: #6aaf63; }

    /* responsive */
    @media (max-width: 620px) {
      .tile { width: 28px; height: 28px; font-size: 0.75rem; border-width: 1.5px; }
      .key  { height: 44px; min-width: 28px; font-size: 0.65rem; }
      .key[data-key="Enter"],
      .key[data-key="⌫"] { min-width: 42px; }
      header h1 { font-size: 1.4rem; }
    }

    @media (max-width: 420px) {
      .tile { width: 22px; height: 22px; font-size: 0.6rem; }
      .key  { height: 38px; min-width: 22px; padding: 0 3px; }
      .key[data-key="Enter"],
      .key[data-key="⌫"] { min-width: 34px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Jeffwordle</h1>
    <p>Guess the 12-letter word in 6 tries</p>
  </header>

  <div id="message"></div>
  <div id="board"></div>
  <div id="keyboard"></div>
  <button id="play-again">Play Again</button>

<script>
// ── Word list ──────────────────────────────────────────────────────────────
const WORD_LIST = [
  "ACCELERATION","ACCUMULATION","ACHIEVEMENTS","ADJUDICATION","AMALGAMATION",
  "AMELIORATION","AMORTIZATION","ANNIHILATION","ANTICIPATION","APPLICATIONS",
  "APPRECIATION","ARCHITECTURE","ASSIMILATION","BIBLIOGRAPHY","BODYBUILDING",
  "BROADCASTING","CALCULATIONS","CAPABILITIES","CAPITULATION","CELEBRATIONS",
  "CERTIFICATES","CHAMPIONSHIP","CHOREOGRAPHY","CIVILIZATION","COLLECTIVISM",
  "COLONIZATION","COMMUNICATES","COMPENSATION","COMPLETENESS","COMPLICATION",
  "COMPUTATIONS","CONCENTRATED","CONDENSATION","CONFISCATION","CONFIRMATION",
  "CONJUNCTIONS","CONNOTATIONS","CONSECRATION","CONSERVATION","CONSISTENTLY",
  "CONSOLIDATED","CONSTRUCTION","CONTEMPORARY","CONTINUATION","CONTRACTIONS",
  "CONTRIBUTION","CONVERSATION","COORDINATION","CORPORATIONS","COUNTERPARTS",
  "CRYSTALLIZED","DECLARATIONS","DELIBERATION","DEMOGRAPHICS","DENOMINATION",
  "DEPRECIATION","DESCRIPTIONS","DESTINATIONS","DEVELOPMENTS","DIFFICULTIES",
  "DISADVANTAGE","DISCIPLINARY","DISCOMFITURE","DISPLACEMENT","DISTINCTIONS",
  "DISTILLATION","DISTRIBUTION","DISTURBANCES","ELECTRIFYING","ENCAPSULATES",
  "ENLARGEMENTS","ENTREPRENEUR","ENVIRONMENTS","EQUALIZATION","EXASPERATION",
  "EXPECTATIONS","EXPERIMENTAL","EXPLANATIONS","EXPLOITATION","FACILITATION",
  "FERMENTATION","FINGERPRINTS","FRANKINCENSE","GENERATIONAL","GEOGRAPHICAL",
  "GOVERNMENTAL","HEADQUARTERS","HUMANITARIAN","HYPOTHETICAL","ILLUMINATING",
  "ILLUMINATION","ILLUSTRATION","IMPLICATIONS","INAUGURATION","INCAPABILITY",
  "INCOMPATIBLE","INCREASINGLY","INDEPENDENCE","INDIVIDUALLY","INEQUALITIES",
  "INEXPLICABLE","INFLAMMATORY","INFRINGEMENT","INSTITUTIONS","INTELLIGENCE",
  "INTERACTIONS","INTERFERENCE","INTIMIDATING","INTRODUCTION","JOURNALISTIC",
  "JURISDICTION","LABORATORIES","LEGALIZATION","LEGITIMATION","LONGITUDINAL",
  "MAGNIFICENCE","MANIPULATION","MANUFACTURER","MARKETPLACES","MATHEMATICAL",
  "MEASUREMENTS","MODIFICATION","MOTIVATIONAL","MULTIPLICITY","MUNICIPALITY",
  "NEIGHBORHOOD","NEVERTHELESS","NOTIFICATION","OBJECTIFYING","OBSERVATIONS",
  "OBSOLESCENCE","OCCASIONALLY","OCCUPATIONAL","OPTIMIZATION","ORGANIZATION",
  "OVERWHELMING","PARTICULARLY","PARTNERSHIPS","PERFORMANCES","PERSEVERANCE",
  "PERSPECTIVES","PERPETUATION","POLARIZATION","PRACTICALITY","PRESERVATION",
  "PROCLAMATION","PRODUCTIVITY","PROFESSIONAL","PROPORTIONAL","PUBLICATIONS",
  "PURIFICATION","QUANTIFIABLE","QUESTIONABLE","REASSURINGLY","RECOGNIZABLE",
  "REGENERATION","RELATIONSHIP","RELENTLESSLY","REPRODUCTION","REQUIREMENTS",
  "SATISFACTION","SATISFACTORY","SCHOLARSHIPS","SIGNIFICANCE","SIMULTANEOUS",
  "SPOKESPERSON","SUBSTITUTION","SUFFICIENTLY","SUPERNATURAL","SURVEILLANCE",
  "TECHNOLOGIES","TEMPERATURES","THANKSGIVING","THUNDERSTORM","TRANSITIONAL",
  "TRANSMISSION","TRANSPARENCY","TROUBLEMAKER","TRUTHFULNESS","UNBELIEVABLE",
  "UNDERPINNING","UNEXPECTEDLY","UNIVERSITIES","UNREMARKABLE","UNSUCCESSFUL",
  "VALORIZATION","VERIFICATION","VETERINARIAN","VOLUNTEERISM","WASTEFULNESS",
  "WATCHFULNESS","WORKMANSHIPS","MOTORIZATION","CONSTITUENCY","CONGLOMERATE",
  "CATEGORIZING","CIRCUMVENTED","COMMEMORATES","MOTORIZATION","COORDINATION",
  "COLLABORATES","CENTRALIZING","CALLISTHENIC","CONSIDERABLY","CONSEQUENCES",
  "AGGREGATIONS","COMMEMORATES","CANDLESTICKS","COMMENCEMENT","COUNTERFORCE"
];

const JEFF = "JEFFGOLDBLUM";
const WORD_LEN = 12;
const MAX_GUESSES = 6;

// ── State ──────────────────────────────────────────────────────────────────
let answer, grid, currentRow, currentCol, gameOver;
const keyState = {};

function pickAnswer() {
  return Math.random() < 0.9
    ? JEFF
    : WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
}

function initGame() {
  answer    = pickAnswer();
  grid      = Array.from({ length: MAX_GUESSES }, () => Array(WORD_LEN).fill(''));
  currentRow = 0;
  currentCol = 0;
  gameOver   = false;
  Object.keys(keyState).forEach(k => delete keyState[k]);
  renderBoard();
  renderKeyboard();
  setMessage('');
  document.getElementById('play-again').style.display = 'none';
}

// ── Rendering ──────────────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < WORD_LEN; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['Enter','Z','X','C','V','B','N','M','⌫']
  ];
  rows.forEach(keys => {
    const row = document.createElement('div');
    row.className = 'kb-row';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = k;
      btn.dataset.key = k;
      btn.addEventListener('click', () => handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function updateTile(r, c, letter) {
  const tile = document.getElementById(`tile-${r}-${c}`);
  tile.textContent = letter;
  if (letter) {
    tile.dataset.letter = letter;
    tile.classList.add('pop');
    tile.addEventListener('animationend', () => tile.classList.remove('pop'), { once: true });
  } else {
    delete tile.dataset.letter;
  }
}

function setMessage(text, persist) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.classList.toggle('visible', !!text);
  if (text && !persist) {
    setTimeout(() => { el.textContent = ''; el.classList.remove('visible'); }, 1800);
  }
}

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') handleKey('Enter');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

function handleKey(key) {
  if (gameOver) return;
  if (key === '⌫') {
    deleteLetter();
  } else if (key === 'Enter') {
    submitGuess();
  } else if (/^[A-Z]$/.test(key) && currentCol < WORD_LEN) {
    addLetter(key);
  }
}

function addLetter(letter) {
  if (currentCol >= WORD_LEN) return;
  grid[currentRow][currentCol] = letter;
  updateTile(currentRow, currentCol, letter);
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 0) return;
  currentCol--;
  grid[currentRow][currentCol] = '';
  updateTile(currentRow, currentCol, '');
}

// ── Guess logic ────────────────────────────────────────────────────────────
function scoreGuess(guess, answer) {
  const result = Array(WORD_LEN).fill('absent');
  const answerLeft = answer.split('');
  const guessLeft  = guess.split('');

  // pass 1: correct
  for (let i = 0; i < WORD_LEN; i++) {
    if (guessLeft[i] === answerLeft[i]) {
      result[i]    = 'correct';
      answerLeft[i] = null;
      guessLeft[i]  = null;
    }
  }
  // pass 2: present
  for (let i = 0; i < WORD_LEN; i++) {
    if (guessLeft[i] === null) continue;
    const j = answerLeft.indexOf(guessLeft[i]);
    if (j !== -1) {
      result[i]    = 'present';
      answerLeft[j] = null;
    }
  }
  return result;
}

function submitGuess() {
  if (currentCol < WORD_LEN) {
    shakeRow(currentRow);
    setMessage(`Need ${WORD_LEN} letters`);
    return;
  }

  const guess  = grid[currentRow].join('');
  const result = scoreGuess(guess, answer);

  // animate tiles
  for (let c = 0; c < WORD_LEN; c++) {
    const tile = document.getElementById(`tile-${currentRow}-${c}`);
    tile.style.setProperty('--bg', '');
    const delay = c * 80;
    setTimeout(() => {
      tile.classList.add(result[c], 'flip');
    }, delay);
  }

  // update keyboard after flip completes
  setTimeout(() => {
    for (let c = 0; c < WORD_LEN; c++) {
      const letter = guess[c];
      const best   = result[c];
      const prev   = keyState[letter];
      if (!prev || (prev === 'absent') || (prev === 'present' && best === 'correct')) {
        keyState[letter] = best;
      }
    }
    updateKeyboard();
  }, WORD_LEN * 80 + 300);

  const won = guess === answer;
  currentRow++;

  setTimeout(() => {
    if (won) {
      endGame(true);
    } else if (currentRow >= MAX_GUESSES) {
      endGame(false);
    } else {
      currentCol = 0;
    }
  }, WORD_LEN * 80 + 350);
}

function endGame(won) {
  gameOver = true;
  const displayAnswer = answer === JEFF ? 'JEFF GOLDBLUM' : answer;

  if (won) {
    const messages = [
      'GENIUS!', 'MAGNIFICENT!', 'INCREDIBLE!', 'SPLENDID!', 'GREAT!', 'PHEW!'
    ];
    setMessage(messages[Math.min(currentRow - 1, messages.length - 1)], true);
  } else {
    setMessage(displayAnswer, true);
  }

  document.getElementById('play-again').style.display = 'inline-block';
}

function shakeRow(r) {
  const row = document.getElementById(`row-${r}`);
  row.querySelectorAll('.tile').forEach(t => {
    t.classList.add('shake');
    t.addEventListener('animationend', () => t.classList.remove('shake'), { once: true });
  });
}

function updateKeyboard() {
  document.querySelectorAll('.key').forEach(btn => {
    const k = btn.dataset.key;
    if (keyState[k]) {
      btn.className = `key ${keyState[k]}`;
    }
  });
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
document.getElementById('play-again').addEventListener('click', initGame);
initGame();
</script>
</body>
</html>
